<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khotwa — Un pas à la fois</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-ar">خطوة</span>
        <span class="logo-en">KHOTWA</span>
      </div>
      <p class="tagline">Un pas. Une action. Maintenant.</p>
    </header>

    <!-- Task Card -->
    <main class="main">
      <div class="card" id="taskCard">
        <div class="card-inner">
          <div class="card-top">
            <span class="badge" id="blocageBadge">En attente…</span>
            <span class="streak" id="streakDisplay" style="display:none">🔥 <span id="streakCount">0</span></span>
          </div>
          <div class="task-text" id="taskText">
            Dis-moi ce qui te bloque.<br/>Je vais te donner <em>une seule</em> action.
          </div>
          <div class="encouragement" id="encouragement"></div>
          <div class="difficulty-bar">
            <span class="diff-label">Difficulté</span>
            <div class="dots" id="diffDots">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Feedback buttons -->
      <div class="feedback-row" id="feedbackRow" style="display:none">
        <button class="btn btn-done" id="btnFait" onclick="sendFeedback('fait')">
          <span class="btn-icon">✅</span> Fait !
        </button>
        <button class="btn btn-hard" id="btnDur" onclick="sendFeedback('trop_dur')">
          <span class="btn-icon">❌</span> Trop dur
        </button>
      </div>
    </main>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Ex: je dois faire un rapport mais je bloque…"
          rows="2"
          onkeydown="handleKey(event)"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="hint">Appuie sur <kbd>Ctrl+Entrée</kbd> pour envoyer</p>
    </div>

    <button class="reset-btn" onclick="resetSession()" title="Réinitialiser">↺ Reset</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
